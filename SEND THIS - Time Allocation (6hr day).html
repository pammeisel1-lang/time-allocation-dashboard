  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

.6\"></circle><circle cx=\"13\" cy=\"7.4\" r=\"2.1\"></circle><path d=\"M1.6 15.5c0-2.5 2-4.2 4.4-4.2s4.4 1.7 4.4 4.2\" stroke-linecap=\"round\"></path><path d=\"M11.4 11.6c2.2 0 4 1.6 4 3.9\" stroke-linecap=\"round\"></path></svg>\n        Team roll-up\n      </a>\n    </nav>\n\n    <div style=\"margin-top:auto;border-top:1px solid rgba(255,255,255,0.12);padding-top:16px;\">\n      <sc-if value=\"{{ editingProfile }}\" hint-placeholder-val=\"{{ false }}\">\n        <form sc-camel-on-submit=\"{{ saveProfileForm }}\" style=\"display:flex;flex-direction:column;gap:8px;\">\n          <input name=\"pname\" sc-camel-default-value=\"{{ userName }}\" placeholder=\"Your name\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:#fff;font-family:inherit;font-size:13px;\">\n          <input name=\"prole\" sc-camel-default-value=\"{{ userRole }}\" placeholder=\"Job title\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:#fff;font-family:inherit;font-size:13px;\">\n          <div style=\"display:flex;gap:8px;\">\n            <button type=\"submit\" style=\"flex:1;padding:7px 0;border-radius:8px;border:none;background:#49bd99;color:#00201c;font-weight:600;font-size:12.5px;cursor:pointer;\">Save</button>\n            <button type=\"button\" sc-camel-on-click=\"{{ cancelEditProfile }}\" style=\"flex:1;padding:7px 0;border-radius:8px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.8);font-size:12.5px;cursor:pointer;\">Cancel</button>\n          </div>\n        </form>\n      </sc-if>\n      <sc-if value=\"{{ notEditingProfile }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:center;gap:11px;\">\n          <div style=\"width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex:none;\">{{ userInitials }}</div>\n          <div style=\"display:flex;flex-direction:column;line-height:1.2;flex:1;min-width:0;\">\n            <span style=\"font-size:13px;font-weight:600;\">{{ userName }}</span>\n            <span style=\"font-size:11.5px;color:rgba(255,255,255,0.5);\">{{ userRole }}</span>\n          </div>\n          <button sc-camel-on-click=\"{{ startEditProfile }}\" title=\"Edit name &amp; title\" style=\"flex:none;width:26px;height:26px;border-radius:7px;border:none;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);cursor:pointer;display:flex;align-items:center;justify-content:center;\">\n            <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 18 18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11.5 2.5l3 3-8 8-3.4.6.6-3.4z\"></path></svg>\n          </button>\n        </div>\n      </sc-if>\n    </div>\n  </aside>\n\n  <main class=\"app-main\" style=\"flex:1;min-width:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;\">\n\n    <header style=\"position:sticky;top:0;z-index:5;background:rgba(238,242,243,0.88);backdrop-filter:blur(8px);border-bottom:1px solid #dfe7e8;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;\">\n      <div style=\"display:flex;flex-direction:column;gap:3px;\">\n        <h1 style=\"margin:0;font-size:23px;font-weight:700;letter-spacing:-0.01em;\">{{ pageTitle }}</h1>\n        <span style=\"font-size:13.5px;color:#5b7178;\">{{ pageSub }}</span>\n      </div>\n      <div class=\"no-print\" style=\"display:flex;align-items:center;gap:10px;\">\n        <sc-if value=\"{{ showMonth }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #dfe7e8;border-radius:10px;padding:0 4px 0 13px;height:42px;\">\n    <div class=\"print-only\" style=\"margin-bottom:22px;padding-bottom:18px;border-bottom:2px solid #003a4a;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:20px;\">\n          <div style=\"display:flex;align-items:center;gap:13px;\">\n            <div style=\"width:38px;height:38px;border-radius:9px;background:#49bd99;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#003a4a;\">FP</div>\n            <div>\n              <div style=\"font-size:19px;font-weight:700;color:#003a4a;line-height:1.1;\">Flagship Partners</div>\n              <div style=\"font-size:12.5px;color:#5b7178;\">Time &amp; billing report</div>\n            </div>\n          </div>\n          <div style=\"text-align:right;\">\n            <div style=\"font-size:16px;font-weight:700;color:#0e2b33;line-height:1.15;\">{{ printTitle }}</div>\n            <div style=\"font-size:12.5px;color:#5b7178;\">{{ printSub }} · {{ reportStamp }}</div>\n          </div>\n        </div>\n      </div>\n\n\n      <!-- DASHBOARD -->\n      <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n\n        <div class=\"pbk\" style=\"display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;\">\n          <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n            <div style=\"min-width:0;background:#fff;border:1px solid #e3e9ea;border-radius:12px;padding:13px 10px;display:flex;flex-direction:column;gap:8px;\">\n              <div style=\"display:flex;align-items:center;gap:6px;min-width:0;\">\n                <span style=\"width:7px;height:7px;border-radius:2px;background:{{ k.accent }};flex:none;\"></span>\n                <span style=\"font-size:10px;font-weight:600;letter-spacing:.03em;color:#5b7178;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ k.label }}</span>\n              </div>\n              <div style=\"display:flex;align-items:baseline;gap:2px;min-width:0;\">\n                <span style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;white-space:nowrap;\">{{ k.value }}</span>\n                <span style=\"font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;color:#8aa0a6;flex:none;\">{{ k.unit }}</span>\n              </div>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:5px;min-width:0;\">\n                <span style=\"font-size:11px;color:#5b7178;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ k.sub }}</span>\n                <sc-if value=\"{{ k.delta }}\" hint-placeholder-val=\"\"><span style=\"font-size:11px;font-weight:600;color:{{ k.delta.color }};white-space:nowrap;flex:none;\">{{ k.delta.text }}</span></sc-if>\n              </div>\n            </div>\n          </sc-for>\n        </div>\n\n        <div class=\"pbk\" style=\"background:#fff;border:1px solid #e3e9ea;border-radius:14px;padding:20px 22px;display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n            <div>\n              <div style=\"font-size:15px;font-weight:600;\">Working days &amp; capacity</div>\n              <div style=\"font-size:12.5px;color:#5b7178;\">{{ cal.monthSub }}</div>\n            </div>\n            <div style=\"display:flex;gap:28px;\">\n              <div style=\"display:flex;flex-direction:column;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:600;line-height:1;\">{{ cal.workingDays }}</span><span style=\"font-size:11.5px;color:#5b7178;margin-top:3px;\">working days</span></div>\n              <sc-if value=\"{{ cal.elapsed }}\" hint-placeholder-val=\"\"><div style=\"display:flex;flex-direction:column;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:600;line-height:1;\">{{ cal.elapsed }}</span><span style=\"font-size:11.5px;color:#5b7178;margin-top:3px;\">elapsed</span></div></sc-if>\n              <div style=\"display:flex;flex-direction:column;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:600;line-height:1;\">{{ cal.capacityStr }}h</span><span style=\"font-size:11.5px;color:#5b7178;margin-top:3px;\">capacity</span></div>\n              <div style=\"display:flex;flex-direction:column;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:600;line-height:1;color:#1c8baf;\">{{ cal.capUtilStr }}</span><span style=\"font-size:11.5px;color:#5b7178;margin-top:3px;\">capacity used</span></div>\n            </div>\n          </div>\n          <div style=\"position:relative;height:14px;border-radius:8px;background:#eef2f3;overflow:hidden;\">\n            <div style=\"position:absolute;left:0;top:0;height:100%;width:{{ cal.loggedPct }}%;background:#1c8baf;border-radius:8px;\"></div>\n            <div style=\"position:absolute;left:0;top:0;height:100%;width:{{ cal.billablePct }}%;background:#49bd99;border-radius:8px;\"></div>\n          </div>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n            <div style=\"display:flex;align-items:center;gap:18px;\">\n              <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#49bd99;flex:none;\"></span><span style=\"font-size:12.5px;color:#3d565d;\">Billable {{ cal.billableStr }}h</span></div>\n              <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#1c8baf;flex:none;\"></span><span style=\"font-size:12.5px;color:#3d565d;\">Logged {{ cal.loggedStr }}h</span></div>\n              <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#fff;border:1px solid #cdd9db;flex:none;\"></span><span style=\"font-size:12.5px;color:#3d565d;\">{{ cal.remainStr }}h to capacity</span></div>\n              <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"font-size:12.5px;color:#5b7178;\">{{ cal.bankHolidays }} bank holiday(s)</span></div>\n              <sc-if value=\"{{ cal.leaveDays }}\" hint-placeholder-val=\"\"><div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#7c93a3;flex:none;\"></span><span style=\"font-size:12.5px;color:#3d565d;\">{{ cal.leaveDays }} days annual leave</span></div></sc-if>\n            </div>\n            <sc-if value=\"{{ cal.paceText }}\" hint-placeholder-val=\"\"><span style=\"font-size:12.5px;font-weight:600;color:{{ cal.paceColor }};\">{{ cal.paceText }}</span></sc-if>\n          </div>\n        </div>\n\n        <div class=\"pbk\" style=\"display:grid;grid-template-columns:330px 1fr;gap:16px;\">\n          <div style=\"background:#fff;border:1px solid #e3e9ea;border-radius:14px;padding:22px;display:flex;flex-direction:column;\">\n            <div style=\"font-size:15px;font-weight:600;margin-bottom:2px;\">Billable split</div>\n            <div style=\"font-size:12.5px;color:#5b7178;margin-bottom:16px;\">Share of logged time that is chargeable</div>\n            <div style=\"display:flex;align-items:center;justify-content:center;margin:6px 0 18px;\">\n              <div style=\"position:relative;width:172px;height:172px;\">\n                <div style=\"position:absolute;inset:0;border-radius:50%;background:{{ donutBg }};\"></div>\n                <div style=\"position:absolute;inset:25px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n                  <span style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:600;color:#0e2b33;line-height:1;\">{{ utilStr }}</span>\n                  <span style=\"font-size:12px;color:#5b7178;margin-top:3px;\">billable</span>\n                </div>\n              </div>\n            </div>\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <div style=\"display:flex;align-items:center;gap:9px;\">\n                <span style=\"width:9px;height:9px;border-radius:2px;background:#49bd99;flex:none;\"></span>\n                <span style=\"font-size:13.5px;flex:1;\">Billable</span>\n                <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-variant-numeric:tabular-nums;\">{{ billableH }}h</span>\n              </div>\n              <div style=\"display:flex;align-items:center;gap:9px;\">\n                <span style=\"width:9px;height:9px;border-radius:2px;background:#1c8baf;flex:none;\"></span>\n                <span style=\"font-size:13.5px;flex:1;\">Non-billable</span>\n                <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-variant-numeric:tabular-nums;\">{{ nonbillH }}h</span>\n              </div>\n            </div>\n          </div>\n\n          <div style=\"background:#fff;border:1px solid #e3e9ea;border-radius:14px;padding:22px;display:flex;flex-direction:column;\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:6px;\">\n              <div>\n                <div style=\"font-size:15px;font-weight:600;\">Cumulative hours</div>\n                <div style=\"font-size:12.5px;color:#5b7178;\">Running total across the period</div>\n              </div>\n              <div style=\"display:flex;gap:18px;\">\n                <div style=\"display:flex;flex-direction:column;align-items:flex-end;\">\n                  <span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:#1c8baf;line-height:1;\">{{ trend.totalStr }}h</span>\n       </sc-if>\n        </div>\n      </div>\n      </sc-if>\n\n      </div>\n    </div>\n  </main>\n</div>\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;userName&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Pam Meisel&quot;,&quot;tsType&quot;:&quot;string&quot;},\n  &quot;userRole&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Transport &amp; compliance&quot;,&quot;tsType&quot;:&quot;string&quot;}\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.RATE = 118;\n    this.WORK = [\n      {name:'Pro-Mile', category:'Client Work', rate:118},\n      {name:'Hudson White', category:'Client Work', rate:118},\n      {name:'Mead Construction', category:'Client Work', rate:118},\n      {name:'Anglia UK', category:'Client Work', rate:118},\n      {name:'Convey', category:'Digital Support', rate:118},\n      {name:'Optifile', category:'Digital Support', rate:118},\n      {name:'Allied', category:'Digital Support', rate:118},\n      {name:'Online TMCPC Review', category:'Project Work', rate:0},\n      {name:'TM Mentoring Scheme', category:'Project Work', rate:0},\n      {name:'Transport Manager Hub', category:'Project Work', rate:0},\n      {name:'Training course', category:'General', rate:0},\n      {name:'CPD', category:'General', rate:0},\n      {name:'Admin', category:'General', rate:0},\n      {name:'Prospecting', category:'General', rate:0},\n      {name:'Annual leave', category:'Annual leave', rate:0},\n    ];\n    this.workMap = {};\n    this.WORK.forEach(w=>{ this.workMap[w.name]=w; });\n    this.CATS = ['Client Work','Digital Support','Project Work','General','Annual leave'];\n    this.DASH_CATS = ['Client Work','Digital Support','Project Work','General'];\n    this.DIVISIONS = ['Transport','Health & Safety','HR'];\n    this.DIVCOLOR = {'Transport':'#1c8baf','Health & Safety':'#e8974d','HR':'#8b6fc9'};\n    this.CATCOLOR = {'Client Work':'#49bd99','Digital Support':'#1c8baf','Project Work':'#ffce6d','General':'#f05376','Annual leave':'#7c93a3'};\n    this.HOURS_PER_DAY = 6; // rate & capacity basis\n    this.STANDARD_DAY_HOURS = 6; // her contracted day — no gap, overtime starts after 6h/day\n    this.BANK_HOLIDAYS = new Set([\n      '2025-01-01','2025-04-18','2025-04-21','2025-05-05','2025-05-26','2025-08-25','2025-12-25','2025-12-26',\n      '2026-01-01','2026-04-03','2026-04-06','2026-05-04','2026-05-25','2026-08-31','2026-12-25','2026-12-28',\n      '2027-01-01','2027-03-26','2027-03-29','2027-05-03','2027-05-31','2027-08-30','2027-12-27','2027-12-28'\n    ]);\n    this.FY_START_MONTH = 6; // Flagship financial year starts in June\n    this.LSKEY = 'fp-time-alloc-v2';\n    this.PROFILE_LSKEY = 'fp-time-alloc-profile-v1';\n    this.SUPABASE_URL = 'https://jesjtdkehyzteoqhycyq.supabase.co';\n    this.SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Implc2p0ZGtlaHl6dGVvcWh5Y3lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMDAyMTcsImV4cCI6MjA5OTU3NjIxN30.SE_bWxKBHaQujC-7IuthAkVu1HeVw5sHX1SLkgnNxBk';\n    this.DASHBOARD_TYPE = '6h';\n    this.idc = {v:1};\n    const now=new Date();\n    const ty=now.getFullYear(), tm=now.getMonth()+1, td=now.getDate();\n    const curKey=`${ty}-${String(tm).padStart(2,'0')}`;\n    const todayIso=`${curKey}-${String(td).padStart(2,'0')}`;\n    let months, work;\n    const saved = this.load();\n    if(saved){ months=saved.months; work=saved.work.slice(); this.idc.v=saved.idc||1; this.WORK.forEach(d=>{ if(!work.some(w=>w.name===d.name)) work.push({...d}); }); }\n    else { months=this.buildFYMonths(this.fyStartFor(ty, tm)); work=this.WORK.slice(); }\n    if(!months.find(m=>m.key===curKey)){ months=this.ensureMonth(months, ty, tm).months; }\n    let profile=null;\n    try{ const raw=localStorage.getItem(this.PROFILE_LSKEY); if(raw) profile=JSON.parse(raw); }catch(e){}\n    this.state = {\n      view:'dashboard',\n      monthKey:curKey,\n      months,\n      work,\n      reportScope:'fy',\n      editingId:null,\n      newClientName:'',\n      newClientCat:'Client Work',\n      form:{ category:'Client Work', client:'Pro-Mile', task:'Advisory call', hours:'', entryMode:'hours', days:'1', billable:true, date:todayIso, note:'', allied:false, fixedPrice:'', division:'' },\n      editingProfile:!(profile && profile.name),\n      profileName:(profile && profile.name) || (this.props && this.props.userName) || '',\n      profileRole:(profile && profile.role) || (this.props && this.props.userRole) || '',\n    };\n  }\n\n  saveProfile(name, role){\n    this.setState({profileName:name, profileRole:role, editingProfile:false});\n    try{ localStorage.setItem(this.PROFILE_LSKEY, JSON.stringify({name, role})); }catch(e){}\n    this.queueCloudPush();\n  }\n\n  slugFor(name){ return (name||'unknown').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'unknown'; }\n\n  componentDidMount(){\n    this.pullCloud();\n  }\n\n  cloudHeaders(){\n    return {'apikey':this.SUPABASE_ANON_KEY, 'Authorization':'Bearer '+this.SUPABASE_ANON_KEY, 'Content-Type':'application/json'};\n  }\n\n  pullCloud(){\n    if(!this.state.profileName || !this.state.profileName.trim()) return;\n    const slug=this.slugFor(this.state.profileName);\n    const url=`${this.SUPABASE_URL}/rest/v1/dashboard_state?person_slug=eq.${encodeURIComponent(slug)}&dashboard_type=eq.${this.DASHBOARD_TYPE}&select=data,updated_at`;\n    fetch(url,{headers:{...this.cloudHeaders(),'Accept':'application/json'}})\n      .then(r=>r.ok?r.json():[])\n      .then(rows=>{\n        if(!rows || !rows.length) { this.queueCloudPush(); this.setState({cloudStatus:'synced \\u2713'}); setTimeout(()=>{ if(this.state.cloudStatus) this.setState({cloudStatus:null}); },4000); return; }\n        const row=rows[0];\n        const localRaw=localStorage.getItem(this.LSKEY);\n        const localSavedAt=localRaw?(JSON.parse(localRaw).savedAt||0):0;\n        const cloudSavedAt=new Date(row.updated_at).getTime();\n        if(cloudSavedAt>localSavedAt && row.data && Array.isArray(row.data.months)){\n          if(row.data.idc) this.idc.v=Math.max(this.idc.v, row.data.idc);\n          this.save(row.data.months, row.data.work, cloudSavedAt);\n          this.setState({months:row.data.months, work:row.data.work||this.state.work, cloudStatus:'synced from cloud \\u2713'});\n        } else {\n          this.queueCloudPush();\n          this.setState({cloudStatus:'synced \\u2713'});\n        }\n        setTimeout(()=>{ if(this.state.cloudStatus) this.setState({cloudStatus:null}); },4000);\n      })\n      .catch(()=>{ this.setState({cloudStatus:'offline \\u2014 using local data'}); setTimeout(()=>{ if(this.state.cloudStatus) this.setState({cloudStatus:null}); },4000); });\n  }\n\n  queueCloudPush(){\n    clearTimeout(this._cloudTimer);\n    this._cloudTimer=setTimeout(()=>this.pushCloud(), 1200);\n  }\n\n  pushCloud(){\n    if(!this.state.profileName || !this.state.profileName.trim()) return;\n    const slug=this.slugFor(this.state.profileName);\n    const url=`${this.SUPABASE_URL}/rest/v1/dashboard_state`;\n    const body=[{person_slug:slug, dashboard_type:this.DASHBOARD_TYPE, data:{months:this.state.months, work:this.state.work, idc:this.idc.v}, updated_at:new Date().toISOString()}];\n    fetch(url,{method:'POST', headers:{...this.cloudHeaders(),'Prefer':'resolution=merge-duplicates,return=minimal'}, body:JSON.stringify(body)}).catch(()=>{});\n  }\n\n  rng(seed){ let s=seed>>>0; return function(){ s = (s + 0x6D2B79F5) | 0; let t = Math.imul(s ^ (s>>>15), 1|s); t = (t + Math.imul(t ^ (t>>>7), 61|t)) ^ t; return ((t ^ (t>>>14))>>>0)/4294967296; }; }\n\n  tasksFor(cat){\n    if(cat==='Client Work') return ['Advisory call','Compliance audit','Report writing','On-site visit','Letters','Policies','Advice','Investigation','Admin','Travel'];\n    if(cat==='Digital Support') return ['Support ticket','Implementation','Training','Account review'];\n    if(cat==='General') return ['Training course','CPD','Admin','Prospecting'];\n    if(cat==='Annual leave') return ['Annual leave'];\n    return ['Content build','Review','Mentoring','Planning'];\n  }\n\n  isBillable(cat,task){ if(cat==='Project Work') return false; if(cat==='Client Work' && (task==='Admin'||task==='Travel')) return false; return true; }\n\n  genMonth(year,month,maxDay){\n    const r=this.rng(year*131+month*17+7);\n    const daysInMonth=new Date(year,month,0).getDate();\n    const last=maxDay?Math.min(maxDay,daysInMonth):daysInMonth;\n    const weights={'Pro-Mile':5,'Hudson White':4,'Mead Construction':4,'Anglia UK':3,'Convey':3,'Optifile':2,'Allied':2,'Online TMCPC Review':2,'TM Mentoring Scheme':2,'Transport Manager Hub':2};\n    const pool=[]; this.WORK.forEach(w=>{ const n=weights[w.name]||1; for(let i=0;i<n;i++) pool.push(w.name); });\n    const entries=[];\n    for(let day=1;day<=last;day++){\n      const dow=new Date(year,month-1,day).getDay();\n      if(dow===0||dow===6){ if(r()>0.12) continue; }\n      const nE=2+Math.floor(r()*3);\n      for(let k=0;k<nE;k++){\n        const name=pool[Math.floor(r()*pool.length)];\n        const w=this.workMap[name];\n        const tasks=this.tasksFor(w.category);\n        const task=tasks[Math.floor(r()*tasks.length)];\n        const hours=Math.round((0.5+r()*3)*4)/4;\n        entries.push({id:this.idc.v++, date:`${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`, day, client:name, category:w.category, task, hours, billable:this.isBillable(w.category,task), rate:w.rate});\n      }\n    }\n    return {key:`${year}-${String(month).padStart(2,'0')}`, label:new Date(year,month-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'}), year, month, daysInMonth, lastDay:last, isCurrent:!!maxDay, entries};\n  }\n\n  aggregate(m){\n    let total=0, billable=0, revenue=0, leaveHours=0;\n    const byClient={}, byTask={}, byCat={}, perDay={};\n    m.entries.forEach(e=>{\n      if(e.category==='Annual leave'){ leaveHours+=e.hours; return; }\n      total+=e.hours;\n      const bh=e.billHours!=null?e.billHours:e.hours;\n      if(!byClient[e.client]) byClient[e.client]={name:e.client,category:e.category,hours:0,billable:0,revenue:0};\n      byClient[e.client].hours+=e.hours;\n      byTask[e.task]=(byTask[e.task]||0)+e.hours;\n      byCat[e.category]=(byCat[e.category]||0)+e.hours;\n      if(!perDay[e.day]) perDay[e.day]={total:0,billable:0};\n      perDay[e.day].total+=e.hours;\n      if(e.billable){ const eff=e.allied?e.rate*0.8:e.rate; const rev=(e.revenueOverride!=null?e.revenueOverride:bh*eff); billable+=bh; revenue+=rev; byClient[e.client].billable+=bh; byClient[e.client].revenue+=rev; perDay[e.day].billable+=bh; }\n    });\n    return {total, billable, nonBillable:total-billable, revenue, leaveHours, util: total>0?billable/total*100:0, byClient, byTask, byCat, perDay};\n  }\n\n  buildTrend(m,agg){\n    const n=m.lastDay, W=720, H=230, padT=12, padB=12, padL=4, padR=4;\n    const innerW=W-padL-padR, innerH=H-padT-padB;\n    const pts=[]; let cumT=0, cumB=0;\n    for(let d=1;d<=n;d++){ const p=agg.perDay[d]||{total:0,billable:0}; cumT+=p.total; cumB+=p.billable; pts.push({cumT,cumB}); }\n    const niceMax=Math.max(Math.ceil(cumT/20)*20,20);\n    const x=(i)=> padL + (n>1? innerW*i/(n-1) : innerW/2);\n    const y=(v)=> padT + innerH*(1 - v/niceMax);\n    const mk=(key)=> pts.map((p,i)=>(i===0?'M':'L')+x(i).toFixed(1)+' '+y(p[key]).toFixed(1)).join(' ');\n    const totalLine=mk('cumT'), billableLine=mk('cumB');\n    const base=(padT+innerH).toFixed(1);\n    const close=' L'+x(n-1).toFixed(1)+' '+base+' L'+x(0).toFixed(1)+' '+base+' Z';\n    const gridlines=[0,0.25,0.5,0.75,1].map(fr=>({y:(padT+innerH*fr).toFixed(1)}));\n    return {totalLine, billableLine, totalArea:totalLine+close, billableArea:billableLine+close, gridlines,\n      totalStr:this.fh(cumT), billStr:this.fh(cumB),\n      startLabel:this.fdate(`${m.year}-${String(m.month).padStart(2,'0')}-01`),\n      endLabel:this.fdate(`${m.year}-${String(m.month).padStart(2,'0')}-${String(n).padStart(2,'0')}`)};\n  }\n\n  fh(n){ return (Math.round(n*10)/10).toLocaleString('en-GB',{minimumFractionDigits:1,maximumFractionDigits:1}); }\n  fdays(n){ const r=Math.round(n*10)/10; return Number.isInteger(r)? String(r) : r.toFixed(1); }\n  fm(n){ return '\\u00A3'+Math.round(n).toLocaleString('en-GB'); }\n  fdate(s){ const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }\n\n  deltaChip(cur,prev,goodUp){\n    if(prev===null||prev===undefined||prev===0) return null;\n    const pct=(cur-prev)/prev*100;\n    const up=pct>=0;\n    const good=goodUp?up:!up;\n    const color=Math.abs(pct)<0.5?'#5b7178':(good?'#1f8a5b':'#d63a5b');\n    return {text:(up?'\\u25B2 ':'\\u25BC ')+Math.abs(pct).toFixed(0)+'% vs prev', color};\n  }\n\n  setForm(patch){\n    const form={...this.state.form,...patch};\n    const work=this.state.work||this.WORK;\n    if(patch.category!==undefined){\n      const first=work.find(w=>w.category===patch.category);\n      form.client=first?first.name:'';\n      const noBill = patch.category==='Project Work' || patch.category==='General' || patch.category==='Annual leave';\n      form.billable = !noBill;\n      const single = patch.category==='General' || patch.category==='Annual leave';\n      form.task = single ? (first?first.name:'') : this.tasksFor(patch.category)[0];\n    }\n    if(patch.client!==undefined && (form.category==='General'||form.category==='Annual leave')){ form.task=patch.client; }\n    this.setState({form});\n  }\n\n  findWork(name){ return (this.state.work||this.WORK).find(w=>w.name===name); }\n\n  addClient(){\n    const name=(this.state.newClientName||'').trim();\n    if(!name) return;\n    const cat=this.state.newClientCat;\n    if(this.findWork(name)){\n      this.setState({newClientName:'', form:{...this.state.form, category:cat, client:name, task:this.tasksFor(cat)[0], billable:cat!=='Project Work'}});\n
